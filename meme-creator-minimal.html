<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Minimal Meme Creator</title>
<style>
body{margin:0;font-family:Inter,system-ui;background:#0a0a10;color:#e5e7eb}.app{max-width:980px;margin:24px auto;padding:16px}.card{background:#121226;border:1px solid #2b2f4a;border-radius:14px;padding:14px}.row{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.stage{min-height:520px;background:#080914;border:1px solid #22263f;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}.ph{text-align:center;color:#94a3b8}.m{display:none;position:relative}.m img{max-width:100%;max-height:500px;display:block;border-radius:10px}.t{position:absolute;transform:translateX(-50%);font-weight:800;text-shadow:2px 2px 0 #000;cursor:move}.panel{display:flex;flex-direction:column;gap:10px}.btn,input,select,textarea{width:100%;border-radius:10px;border:1px solid #31365a;background:#0b0e1d;color:#fff;padding:10px}.btn{cursor:pointer;font-weight:700}.p{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.sw{aspect-ratio:1;border-radius:7px;border:2px solid transparent;cursor:pointer}.a{border-color:#fff}@media(max-width:900px){.row{grid-template-columns:1fr}}
</style></head><body><div class="app"><div class="card"><div class="row"><div class="stage"><div id="ph" class="ph"><p>Upload image</p></div><div id="m" class="m"><img id="img"></div></div><div class="panel"><button id="u" class="btn">Upload</button><textarea id="txt" placeholder="Type live text..."></textarea><select id="pos"><option value="top">Top</option><option value="mid" selected>Middle</option><option value="bot">Bottom</option></select><input id="size" type="range" min="16" max="96" value="44"><div id="pal" class="p"></div><button id="save" class="btn">Save PNG</button></div></div></div></div><input id="f" type="file" accept="image/*" hidden>
<script>
const C=['#fff','#000','#f43f5e','#f59e0b','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#94a3b8'];
let st={src:'',x:300,y:220,size:44,color:'#fff',text:''};
const $=id=>document.getElementById(id),img=$('img'),m=$('m'),ph=$('ph');
function layer(){let n=m.querySelector('.t');if(!n){n=document.createElement('div');n.className='t';m.appendChild(n);let d=0,sx=0,sy=0,ox=0,oy=0;n.onmousedown=e=>{d=1;sx=e.clientX;sy=e.clientY;ox=st.x;oy=st.y;e.preventDefault()};document.onmousemove=e=>{if(!d)return;const r=img.getBoundingClientRect();st.x=Math.max(8,Math.min(ox+e.clientX-sx,r.width-8));st.y=Math.max(18,Math.min(oy+e.clientY-sy,r.height-12));render()};document.onmouseup=()=>d=0;}return n}
function applyPos(v){const r=img.getBoundingClientRect();if(v==='top')st.y=Math.max(24,st.size*.9);if(v==='mid')st.y=(r.height||440)/2;if(v==='bot')st.y=(r.height||440)-22}
function render(){if(!st.src)return;ph.style.display='none';m.style.display='inline-block';img.src=st.src;const n=layer();n.textContent=st.text;n.style.left=st.x+'px';n.style.top=st.y+'px';n.style.fontSize=st.size+'px';n.style.color=st.color;}
const pal=$('pal');C.forEach(c=>{const b=document.createElement('button');b.className='sw'+(c===st.color?' a':'');b.style.background=c;b.onclick=()=>{st.color=c;[...pal.children].forEach(x=>x.classList.remove('a'));b.classList.add('a');render()};pal.appendChild(b)});
$('u').onclick=()=>$('f').click();$('f').onchange=e=>{const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=ev=>{st.src=ev.target.result;render()};r.readAsDataURL(file)};
$('txt').oninput=e=>{st.text=e.target.value;render()};$('size').oninput=e=>{st.size=+e.target.value;render()};$('pos').onchange=e=>{applyPos(e.target.value);render()};
$('save').onclick=()=>{if(!st.src)return;const c=document.createElement('canvas'),im=new Image();im.onload=()=>{c.width=im.naturalWidth;c.height=im.naturalHeight;const x=c.getContext('2d');x.drawImage(im,0,0);const r=img.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;x.font=`800 ${Math.round(st.size*sy)}px Inter`;x.textAlign='center';x.fillStyle=st.color;x.strokeStyle='#000';x.lineWidth=3;x.strokeText(st.text,st.x*sx,(st.y+st.size*.35)*sy);x.fillText(st.text,st.x*sx,(st.y+st.size*.35)*sy);const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='minimal-meme.png';a.click()};im.src=st.src};
</script></body></html>
