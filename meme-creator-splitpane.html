<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memotions Creator - Split Pane</title>
<link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#07070d;--panel:#0f1020;--line:#282b45;--text:#e2e8f0;--muted:#94a3b8;--brand:#7c3aed;--brand2:#8b5cf6}
body{font-family:Inter,system-ui;background:radial-gradient(900px 500px at 10% -10%,#1a1640 0%,transparent 55%),radial-gradient(700px 500px at 110% -20%,#281542 0%,transparent 45%),var(--bg);color:var(--text)}
.shell{max-width:1320px;margin:14px auto;padding:10px}.top{border:1px solid var(--line);background:rgba(12,13,25,.85);border-radius:14px;padding:10px 14px;margin-bottom:10px;font-family:'Irish Grover',cursive}
.app{height:calc(100vh - 110px);display:grid;grid-template-columns:300px 1fr 320px;gap:10px}.side{background:linear-gradient(180deg,#111226,#0d0f1d);border:1px solid var(--line);border-radius:12px;padding:10px;overflow:auto}.c{background:linear-gradient(180deg,#111226,#0d0f1d);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.m{display:none;position:relative}.m img{max-width:100%;max-height:92vh}.t{position:absolute;transform:translateX(-50%);font-weight:800;text-shadow:2px 2px 0 #000;cursor:move}.b,input,select,textarea{width:100%;margin:6px 0;border-radius:8px;border:1px solid #363d63;background:#0c1022;color:#fff;padding:9px}.b{cursor:pointer;font-weight:700}.bp{background:linear-gradient(135deg,var(--brand2),var(--brand));border-color:transparent}.p{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.sw{aspect-ratio:1;border-radius:6px;border:2px solid transparent;cursor:pointer}.sw.a{border-color:#fff}
@media(max-width:1050px){.app{grid-template-columns:1fr;height:auto}.c{min-height:420px}}
</style></head>
<body><div class="shell"><div class="top">Memotions Creator Split Pane</div><div class="app"><aside class="side"><h3>Asset & Export</h3><button id="up" class="b bp">Upload</button><select id="fmt"><option>png</option><option>jpeg</option><option>webp</option></select><select id="preset"><option value="original">Original</option><option value="1024x1024">1024x1024</option><option value="1080x1920">1080x1920</option></select><button id="save" class="b bp">Export</button></aside><main class="c"><div id="ph" style="color:var(--muted)">Upload image</div><div id="m" class="m"><img id="img"></div></main><aside class="side"><h3>Text Controls</h3><textarea id="txt" placeholder="Live typing"></textarea><select id="pos"><option value="top">Top</option><option value="mid" selected>Middle</option><option value="bot">Bottom</option></select><input id="size" type="range" min="14" max="120" value="48"><input id="op" type="range" min="0.2" max="1" step="0.01" value="1"><div id="pal" class="p"></div><button id="dup" class="b">Duplicate</button><button id="del" class="b">Delete</button></aside></div></div><input id="f" type="file" accept="image/*" hidden>
<script>
const C=['#fff','#000','#f43f5e','#f59e0b','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#9ca3af'];
const $=id=>document.getElementById(id);let S={src:'',layers:[],aid:null,color:'#fff',fmt:'png',preset:'original'};const m=$('m'),img=$('img');
function mkLayer(txt=''){const r=img.getBoundingClientRect();return{id:Date.now()+Math.random(),text:txt,x:(r.width||700)/2,y:(r.height||460)/2,size:+$('size').value,op:+$('op').value,color:S.color}};
const act=()=>S.layers.find(x=>x.id===S.aid)||null;function ensure(){let l=act();if(l)return l;if(!S.src)return null;l=mkLayer('');S.layers.push(l);S.aid=l.id;return l}
function render(){if(!S.src)return;$('ph').style.display='none';m.style.display='inline-block';img.src=S.src;m.querySelectorAll('.t').forEach(n=>n.remove());S.layers.forEach(l=>{const n=document.createElement('div');n.className='t';n.textContent=l.text;n.style.left=l.x+'px';n.style.top=l.y+'px';n.style.fontSize=l.size+'px';n.style.opacity=l.op;n.style.color=l.color;let d=0,sx=0,sy=0,ox=0,oy=0;n.onmousedown=e=>{d=1;sx=e.clientX;sy=e.clientY;ox=l.x;oy=l.y;S.aid=l.id};document.onmousemove=e=>{if(!d)return;const r=img.getBoundingClientRect();l.x=Math.max(8,Math.min(ox+e.clientX-sx,r.width-8));l.y=Math.max(18,Math.min(oy+e.clientY-sy,r.height-12));render()};document.onmouseup=()=>d=0;m.appendChild(n)});}
function setPos(v){const l=ensure();if(!l)return;const r=img.getBoundingClientRect();if(v==='top')l.y=Math.max(24,l.size*.9);if(v==='mid')l.y=(r.height||460)/2;if(v==='bot')l.y=(r.height||460)-22;render()}
$('up').onclick=()=>$('f').click();$('f').onchange=e=>{const file=e.target.files?.[0];if(!file)return;const fr=new FileReader();fr.onload=ev=>{S.src=ev.target.result;if(!S.layers.length){const l=mkLayer('');S.layers=[l];S.aid=l.id}render()};fr.readAsDataURL(file)};
$('txt').oninput=e=>{const l=ensure();if(!l)return;l.text=e.target.value;render()};$('size').oninput=e=>{const l=ensure();if(!l)return;l.size=+e.target.value;render()};$('op').oninput=e=>{const l=ensure();if(!l)return;l.op=+e.target.value;render()};$('pos').onchange=e=>setPos(e.target.value);
$('fmt').onchange=e=>S.fmt=e.target.value;$('preset').onchange=e=>S.preset=e.target.value;
const pal=$('pal');C.forEach(c=>{const b=document.createElement('button');b.className='sw'+(c===S.color?' a':'');b.style.background=c;b.onclick=()=>{S.color=c;const l=ensure();if(l)l.color=c;[...pal.children].forEach(x=>x.classList.remove('a'));b.classList.add('a');render()};pal.appendChild(b)});
$('dup').onclick=()=>{const l=act();if(!l)return;const d={...l,id:Date.now()+Math.random(),x:l.x+25,y:l.y+25};S.layers.push(d);S.aid=d.id;render()};$('del').onclick=()=>{if(!S.aid)return;S.layers=S.layers.filter(x=>x.id!==S.aid);S.aid=S.layers[0]?.id||null;render()};
$('save').onclick=()=>{if(!S.src)return;const im=new Image();im.onload=()=>{let w=im.naturalWidth,h=im.naturalHeight;if(S.preset!=='original'){[w,h]=S.preset.split('x').map(Number)}const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');x.drawImage(im,0,0,w,h);const r=img.getBoundingClientRect(),sx=w/r.width,sy=h/r.height;S.layers.forEach(l=>{x.globalAlpha=l.op;x.font=`800 ${Math.round(l.size*sy)}px Inter`;x.textAlign='center';x.fillStyle=l.color;x.strokeStyle='#000';x.lineWidth=3;x.strokeText(l.text,l.x*sx,(l.y+l.size*.35)*sy);x.fillText(l.text,l.x*sx,(l.y+l.size*.35)*sy);x.globalAlpha=1});const a=document.createElement('a');const mime=S.fmt==='jpeg'?'image/jpeg':S.fmt==='webp'?'image/webp':'image/png';a.href=c.toDataURL(mime,.92);a.download='splitpane-meme.'+S.fmt;a.click()};im.src=S.src};
</script></body></html>
