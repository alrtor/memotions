<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memotions Creator - Steps</title>
<link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#07070d;--panel:#0f1020;--line:#282b45;--text:#e2e8f0;--muted:#94a3b8;--brand:#7c3aed;--brand2:#8b5cf6}
body{font-family:Inter,system-ui;background:radial-gradient(900px 500px at 10% -10%,#1a1640 0%,transparent 55%),radial-gradient(700px 500px at 110% -20%,#281542 0%,transparent 45%),var(--bg);color:var(--text)}
.app{max-width:1120px;margin:16px auto;padding:12px}.top{border:1px solid var(--line);background:rgba(12,13,25,.85);border-radius:14px;padding:10px 14px;margin-bottom:10px;font-family:'Irish Grover',cursive}
.head{display:flex;gap:8px;margin-bottom:10px}.s{flex:1;border:1px solid #303655;background:#121428;border-radius:10px;padding:8px;font-size:.8rem}.s.a{border-color:#8b5cf6;background:#171838}
.row{display:grid;grid-template-columns:1.5fr .9fr;gap:12px}.stage{background:#090b17;border:1px solid #242946;border-radius:12px;min-height:560px;display:flex;align-items:center;justify-content:center;overflow:hidden}.m{display:none;position:relative}.m img{max-width:100%;max-height:530px}.t{position:absolute;transform:translateX(-50%);font-weight:800;text-shadow:2px 2px 0 #000;cursor:move}
.panel{background:linear-gradient(180deg,#111226,#0d0f1d);border:1px solid var(--line);border-radius:12px;padding:10px}.btn,input,select,textarea{width:100%;margin:6px 0;border:1px solid #37406a;background:#0c1022;color:#fff;border-radius:9px;padding:9px}.btn{cursor:pointer;font-weight:700}.bp{background:linear-gradient(135deg,var(--brand2),var(--brand));border-color:transparent}
.pal{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.sw{aspect-ratio:1;border-radius:6px;border:2px solid transparent}.sw.a{border-color:#fff}@media(max-width:900px){.row{grid-template-columns:1fr}}
</style></head><body>
<div class="app"><div class="top">Memotions Creator Steps</div><div class="head"><div id="st1" class="s a">1. Upload</div><div id="st2" class="s">2. Add Text</div><div id="st3" class="s">3. Export</div></div><div class="row"><div class="stage"><div id="ph" style="color:var(--muted)">Start with image upload</div><div id="m" class="m"><img id="img"></div></div><div class="panel"><button id="up" class="btn bp">Upload Image</button><textarea id="txt" placeholder="Type live text"></textarea><select id="pos"><option value="top">Top</option><option value="mid" selected>Middle</option><option value="bot">Bottom</option></select><input id="size" type="range" min="16" max="100" value="42"><div id="pal" class="pal"></div><select id="fmt"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WEBP</option></select><button id="save" class="btn bp">Save Meme</button></div></div></div><input id="f" type="file" accept="image/*" hidden>
<script>
const C=['#fff','#000','#f43f5e','#f59e0b','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#9ca3af'];const $=id=>document.getElementById(id);
let s={src:'',x:320,y:220,size:42,text:'',color:'#fff',fmt:'png'};const m=$('m'),img=$('img');function step(n){$('st1').classList.toggle('a',n===1);$('st2').classList.toggle('a',n===2);$('st3').classList.toggle('a',n===3)}
function node(){let n=m.querySelector('.t');if(!n){n=document.createElement('div');n.className='t';m.appendChild(n);let d=0,sx=0,sy=0,ox=0,oy=0;n.onmousedown=e=>{d=1;sx=e.clientX;sy=e.clientY;ox=s.x;oy=s.y};document.onmousemove=e=>{if(!d)return;const r=img.getBoundingClientRect();s.x=Math.max(8,Math.min(ox+e.clientX-sx,r.width-8));s.y=Math.max(20,Math.min(oy+e.clientY-sy,r.height-12));render()};document.onmouseup=()=>d=0;}return n}
function pos(v){const r=img.getBoundingClientRect();if(v==='top')s.y=Math.max(24,s.size*.9);if(v==='mid')s.y=(r.height||440)/2;if(v==='bot')s.y=(r.height||440)-22}
function render(){if(!s.src)return;$('ph').style.display='none';m.style.display='inline-block';img.src=s.src;const n=node();n.textContent=s.text;n.style.left=s.x+'px';n.style.top=s.y+'px';n.style.fontSize=s.size+'px';n.style.color=s.color}
$('up').onclick=()=>$('f').click();$('f').onchange=e=>{const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=ev=>{s.src=ev.target.result;render();step(2)};r.readAsDataURL(file)};
$('txt').oninput=e=>{s.text=e.target.value;render();if(s.text.trim())step(3)};$('size').oninput=e=>{s.size=+e.target.value;render()};$('pos').onchange=e=>{pos(e.target.value);render()};$('fmt').onchange=e=>s.fmt=e.target.value;
const p=$('pal');C.forEach(c=>{const b=document.createElement('button');b.className='sw'+(c===s.color?' a':'');b.style.background=c;b.onclick=()=>{s.color=c;[...p.children].forEach(x=>x.classList.remove('a'));b.classList.add('a');render()};p.appendChild(b)});
$('save').onclick=()=>{if(!s.src)return;const im=new Image();im.onload=()=>{const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;const x=c.getContext('2d');x.drawImage(im,0,0);const r=img.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;x.font=`800 ${Math.round(s.size*sy)}px Inter`;x.textAlign='center';x.fillStyle=s.color;x.strokeStyle='#000';x.lineWidth=3;x.strokeText(s.text,s.x*sx,(s.y+s.size*.35)*sy);x.fillText(s.text,s.x*sx,(s.y+s.size*.35)*sy);const a=document.createElement('a');const mime=s.fmt==='jpeg'?'image/jpeg':s.fmt==='webp'?'image/webp':'image/png';a.href=c.toDataURL(mime,.92);a.download='step-meme.'+s.fmt;a.click()};im.src=s.src};
</script></body></html>
