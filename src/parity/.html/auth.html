<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memotions · Sign in to continue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* animated gradient background (matches dark mood) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.12), rgba(12, 12, 20, 0.96));
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 2rem;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(14, 14, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(34, 34, 50, 0.8);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(139, 92, 246, 0.1);
            padding: 2.25rem 2rem 2.5rem;
            transition: all 0.2s ease;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo {
            font-family: 'Irish Grover', cursive;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #1a1a2a, #0c0c14);
            padding: 0.5rem 1.5rem 0.5rem 1.25rem;
            border-radius: 4rem;
            border: 1px solid #2d2d40;
        }

        .logo i {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            padding: 0.6rem;
            border-radius: 1.25rem;
            font-size: 1.4rem;
        }

        .toggle-buttons {
            display: flex;
            gap: 0.75rem;
            background: #12121c;
            padding: 0.5rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
            border: 1px solid #222232;
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 0.75rem 0;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #9ca3af;
            background: transparent;
            border: none;
        }

        .toggle-btn.active {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 6px 14px rgba(139, 92, 246, 0.3);
        }

        .form-panel {
            transition: opacity 0.2s ease;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #d1d5db;
        }

        .input-field {
            width: 100%;
            background: #0a0a12;
            border: 1.5px solid #262638;
            border-radius: 1.25rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: #8b5cf6;
            background: #12121c;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .input-field::placeholder {
            color: #4b5563;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(95deg, #8b5cf6, #a78bfa);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 6px 14px rgba(139, 92, 246, 0.2);
        }

        .submit-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #7c3aed, #8b5cf6);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #4b5563;
            font-size: 0.8125rem;
            margin: 1.25rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #262638;
        }

        .google-btn {
            width: 100%;
            background: #12121c;
            border: 1.5px solid #2d2d40;
            border-radius: 2rem;
            padding: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #f3f4f6;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .google-btn i {
            font-size: 1.3rem;
            color: #ffffff;
        }

        .google-btn:hover {
            background: #1e1e2e;
            border-color: #8b5cf6;
            transform: translateY(-2px);
        }

        .footnote {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .footnote a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 500;
        }

        .error-message {
            background: rgba(244, 63, 94, 0.15);
            border-left: 3px solid #f43f5e;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            color: #fecdd3;
            display: none;
        }

        .toast-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            color: #f3f4f6;
            padding: 0.875rem 2rem;
            border-radius: 3rem;
            font-weight: 500;
            font-size: 0.9375rem;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border: 1px solid #8b5cf6;
        }

        .toast-message.show {
            opacity: 1;
        }

        /* demo redirection simulation */
        .mock-redirect {
            display: none;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-area">
            <div class="logo">
                <i class="fas fa-face-smile"></i>
                <span>Memotions</span>
            </div>
        </div>

        <div class="toggle-buttons">
            <button class="toggle-btn active" data-form="signin">Sign In</button>
            <button class="toggle-btn" data-form="signup">Sign Up</button>
        </div>

        <!-- Sign In Form -->
        <div id="signin-panel" class="form-panel">
            <div id="signin-error" class="error-message"></div>
            <div class="input-group">
                <label class="input-label">Email address</label>
                <input type="email" id="signin-email" class="input-field" placeholder="hello@memotions.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="signin-password" class="input-field" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button id="signin-submit" class="submit-btn">Sign In →</button>

            <div class="divider">
                <span class="divider-line"></span>
                <span>or continue with</span>
                <span class="divider-line"></span>
            </div>

            <button id="google-signin-btn" class="google-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <div class="footnote">
                Don't have an account? <a href="#" id="switch-to-signup">Create one</a>
            </div>
        </div>

        <!-- Sign Up Form -->
        <div id="signup-panel" class="form-panel" style="display: none;">
            <div id="signup-error" class="error-message"></div>
            <div class="input-group">
                <label class="input-label">Username</label>
                <input type="text" id="signup-username" class="input-field" placeholder="@memelover" autocomplete="username">
            </div>
            <div class="input-group">
                <label class="input-label">Email address</label>
                <input type="email" id="signup-email" class="input-field" placeholder="hello@memotions.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="signup-password" class="input-field" placeholder="Create a strong password" autocomplete="new-password">
            </div>
            <button id="signup-submit" class="submit-btn">Create Account →</button>

            <div class="divider">
                <span class="divider-line"></span>
                <span>or continue with</span>
                <span class="divider-line"></span>
            </div>

            <button id="google-signup-btn" class="google-btn">
                <i class="fab fa-google"></i> Sign up with Google
            </button>
            <div class="footnote">
                Already have an account? <a href="#" id="switch-to-signin">Sign in</a>
            </div>
        </div>
    </div>
    <div class="footnote" style="margin-top: 1rem; opacity: 0.7;">
        © 2026 Memotions
    </div>
</div>
<div id="toast" class="toast-message"></div>

<script>
    (function() {
        // DOM elements
        const signinPanel = document.getElementById('signin-panel');
        const signupPanel = document.getElementById('signup-panel');
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        const switchToSignup = document.getElementById('switch-to-signup');
        const switchToSignin = document.getElementById('switch-to-signin');
        const signinSubmit = document.getElementById('signin-submit');
        const signupSubmit = document.getElementById('signup-submit');
        const googleSigninBtn = document.getElementById('google-signin-btn');
        const googleSignupBtn = document.getElementById('google-signup-btn');
        const toastEl = document.getElementById('toast');
        
        // Error containers
        const signinErrorDiv = document.getElementById('signin-error');
        const signupErrorDiv = document.getElementById('signup-error');
        
        // Inputs signin
        const signinEmail = document.getElementById('signin-email');
        const signinPassword = document.getElementById('signin-password');
        
        // Inputs signup
        const signupUsername = document.getElementById('signup-username');
        const signupEmail = document.getElementById('signup-email');
        const signupPassword = document.getElementById('signup-password');
        
        // Helper: show toast with matching style
        function showToast(text, emoji = '✨') {
            toastEl.innerHTML = `${emoji} ${text}`;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2200);
        }
        
        // Helper: simulate redirect to main feed (memotions.html)
        function redirectToFeed(userData = {}) {
            // For demo: store simple flag in sessionStorage to simulate auth state
            if (userData.email) {
                sessionStorage.setItem('memotions_auth', JSON.stringify({
                    loggedIn: true,
                    user: userData.email.split('@')[0] || 'memer',
                    timestamp: Date.now()
                }));
            } else if (userData.username) {
                sessionStorage.setItem('memotions_auth', JSON.stringify({
                    loggedIn: true,
                    user: userData.username,
                    timestamp: Date.now()
                }));
            } else {
                sessionStorage.setItem('memotions_auth', JSON.stringify({ loggedIn: true, user: 'guest' }));
            }
            showToast(`Welcome to Memotions! Redirecting...`, '🎭');
            setTimeout(() => {
                // In a real environment, you would redirect to the feed page.
                // Since this is a combined demo, we simulate redirect by reloading with parameter
                // but we preserve the feed view? Actually we want to mimic navigation to main feed.
                // Because the current document is the auth page, we can replace the location with memotions.html if exists.
                // For perfect integration: we just load the original meme feed but in same tab.
                // Since we have the original HTML in context but we are on a separate file, we can use location.href to feed.
                // However, to keep demo fully functional: we redirect to the same origin? We'll open a new page approach.
                // For best UX: inform that redirect would happen. In standalone demo we can reload with feed param.
                window.location.href = 'memotions.html';  // Assuming memotions.html exists in same directory
                // fallback if not found: alert and show simulation
            }, 800);
        }
        
        // Validate email helper
        function isValidEmail(email) {
            return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
        }
        
        // clear errors
        function clearErrors() {
            signinErrorDiv.style.display = 'none';
            signupErrorDiv.style.display = 'none';
            signinErrorDiv.innerHTML = '';
            signupErrorDiv.innerHTML = '';
        }
        
        // Sign in logic (mock)
        function handleSignIn() {
            clearErrors();
            const email = signinEmail.value.trim();
            const password = signinPassword.value.trim();
            
            if (!email || !password) {
                signinErrorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please fill in both email and password.';
                signinErrorDiv.style.display = 'block';
                return;
            }
            if (!isValidEmail(email)) {
                signinErrorDiv.innerHTML = '<i class="fas fa-envelope"></i> Enter a valid email address.';
                signinErrorDiv.style.display = 'block';
                return;
            }
            if (password.length < 3) {
                signinErrorDiv.innerHTML = '<i class="fas fa-lock"></i> Password must be at least 3 characters.';
                signinErrorDiv.style.display = 'block';
                return;
            }
            
            // mock signin success
            showToast(`Welcome back, ${email.split('@')[0]}!`, '🔥');
            setTimeout(() => {
                redirectToFeed({ email: email });
            }, 400);
        }
        
        // Sign up logic (mock)
        function handleSignUp() {
            clearErrors();
            const username = signupUsername.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value.trim();
            
            if (!username || !email || !password) {
                signupErrorDiv.innerHTML = '<i class="fas fa-times-circle"></i> All fields are required.';
                signupErrorDiv.style.display = 'block';
                return;
            }
            if (username.length < 3) {
                signupErrorDiv.innerHTML = '<i class="fas fa-user"></i> Username must be at least 3 characters.';
                signupErrorDiv.style.display = 'block';
                return;
            }
            if (!isValidEmail(email)) {
                signupErrorDiv.innerHTML = '<i class="fas fa-envelope"></i> Please provide a valid email.';
                signupErrorDiv.style.display = 'block';
                return;
            }
            if (password.length < 5) {
                signupErrorDiv.innerHTML = '<i class="fas fa-key"></i> Password must be at least 5 characters.';
                signupErrorDiv.style.display = 'block';
                return;
            }
            
            // mock account creation
            showToast(`✨ Account created! Welcome @${username}`, '🎉');
            setTimeout(() => {
                redirectToFeed({ username: username, email: email });
            }, 500);
        }
        
        // ---- GOOGLE AUTH SIMULATION (matches meme feed style with Google popup vibe) ----
        function simulateGoogleAuth(mode = 'signin') {
            // Emulates OAuth popup / consent flow
            clearErrors();
            showToast(`🔄 Connecting to Google ...`, '🔐');
            setTimeout(() => {
                // Mock user data from google
                const mockGoogleUser = {
                    name: mode === 'signin' ? 'Alex Memester' : 'New Google Fan',
                    email: mode === 'signin' ? 'alex.meme@googlemail.com' : 'gigi.motions@gmail.com',
                    picture: null
                };
                const displayName = mockGoogleUser.email.split('@')[0];
                if (mode === 'signin') {
                    showToast(`✅ Signed in as ${displayName} via Google`, '🔑');
                    redirectToFeed({ email: mockGoogleUser.email });
                } else {
                    showToast(`🎉 Account created with Google · @${displayName}`, '🚀');
                    redirectToFeed({ username: displayName, email: mockGoogleUser.email });
                }
            }, 800);
        }
        
        // ---- toggle forms ----
        function setActiveForm(formType) {
            if (formType === 'signin') {
                signinPanel.style.display = 'block';
                signupPanel.style.display = 'none';
                toggleBtns.forEach(btn => {
                    if (btn.getAttribute('data-form') === 'signin') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                clearErrors();
            } else {
                signinPanel.style.display = 'none';
                signupPanel.style.display = 'block';
                toggleBtns.forEach(btn => {
                    if (btn.getAttribute('data-form') === 'signup') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                clearErrors();
            }
        }
        
        // attach event listeners
        signinSubmit.addEventListener('click', (e) => {
            e.preventDefault();
            handleSignIn();
        });
        
        signupSubmit.addEventListener('click', (e) => {
            e.preventDefault();
            handleSignUp();
        });
        
        googleSigninBtn.addEventListener('click', (e) => {
            e.preventDefault();
            simulateGoogleAuth('signin');
        });
        
        googleSignupBtn.addEventListener('click', (e) => {
            e.preventDefault();
            simulateGoogleAuth('signup');
        });
        
        // Toggle via buttons
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const form = btn.getAttribute('data-form');
                if (form === 'signin') setActiveForm('signin');
                else setActiveForm('signup');
            });
        });
        
        if (switchToSignup) {
            switchToSignup.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveForm('signup');
            });
        }
        
        if (switchToSignin) {
            switchToSignin.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveForm('signin');
            });
        }
        
        // optional: submit on enter key for forms
        const handleEnter = (e, type) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (type === 'signin') handleSignIn();
                else handleSignUp();
            }
        };
        
        signinPassword.addEventListener('keypress', (e) => handleEnter(e, 'signin'));
        signinEmail.addEventListener('keypress', (e) => handleEnter(e, 'signin'));
        signupPassword.addEventListener('keypress', (e) => handleEnter(e, 'signup'));
        signupEmail.addEventListener('keypress', (e) => handleEnter(e, 'signup'));
        signupUsername.addEventListener('keypress', (e) => handleEnter(e, 'signup'));
        
        // prefill demo for better showcase
        signinEmail.value = 'demo@memotions.com';
        signinPassword.value = 'meme123';
        signupUsername.value = 'memefanatic';
        signupEmail.value = 'fan@memotions.com';
        signupPassword.value = 'ilovememes';
        
        // initial animation toast to hint
        setTimeout(() => {
            showToast('Sign in or create account to enter Memotions', '🎭');
        }, 400);
        
        // additional polish: simulate loading effect for Google
        // Side note: no actual OAuth keys needed — perfect demo integration.
        // style tweak for error messages
        const style = document.createElement('style');
        style.textContent = `
            .error-message i { margin-right: 6px; }
            .google-btn:active { transform: scale(0.97); }
            .input-field:-webkit-autofill,
            .input-field:-webkit-autofill:focus {
                transition: background-color 0s 600000s, color 0s 600000s;
            }
        `;
        document.head.appendChild(style);
        
        // Attach hover effect to mimic memotions interactivity
        const cards = document.querySelectorAll('.auth-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);
            });
        });
        
        // Simulate redirection to main feed after successful auth; If memotions.html is not accessible,
        // provide graceful fallback notification but still works. (In full integration, it will work)
        // Also check if user already has session? optional redirect.
        const existingAuth = sessionStorage.getItem('memotions_auth');
        if (existingAuth) {
            try {
                const authData = JSON.parse(existingAuth);
                if (authData.loggedIn && (Date.now() - authData.timestamp) < 3600000) {
                    // optional: show 'already logged in' then redirect to feed after 1sec
                    setTimeout(() => {
                        showToast(`Already signed in, redirecting...`, '🔄');
                        setTimeout(() => { window.location.href = 'memotions.html'; }, 600);
                    }, 200);
                } else {
                    sessionStorage.removeItem('memotions_auth');
                }
            } catch(e) {}
        }
    })();
</script>
</body>
</html>
