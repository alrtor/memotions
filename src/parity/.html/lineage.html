<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Memotions · Remix Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080c;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            background: #0a0a10;
            min-height: 100vh;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #0c0c14;
            border-bottom: 1px solid #1a1a28;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Irish Grover', cursive;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 0.5rem;
            border-radius: 1rem;
            font-size: 1.2rem;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            font-size: 1.3rem;
            color: #9ca3af;
        }

        .nav-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            padding: 2rem 2rem 1rem 2rem;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .page-header p {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0.5rem 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #12121c;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            border: 1px solid #2d2d40;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card i {
            color: #fbbf24;
        }

        /* Search & Filter Row */
        .search-filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 2;
            min-width: 250px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #12121c;
            border: 1px solid #2d2d40;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s;
        }

        .search-box:focus-within {
            border-color: #8b5cf6;
        }

        .search-box i {
            color: #6b7280;
            margin-right: 0.8rem;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.85rem;
        }

        .search-box input::placeholder {
            color: #4b5563;
        }

        .filter-wrapper {
            flex: 1;
            min-width: 200px;
        }

        .category-select {
            width: 100%;
            background: #12121c;
            border: 1px solid #2d2d40;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .category-select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        /* Memes Grid */
        .memes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem 2rem 2rem 2rem;
        }

        /* Meme Card */
        .meme-card {
            background: #12121c;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #2d2d40;
            transition: all 0.2s;
            cursor: pointer;
        }

        .meme-card:hover {
            transform: translateY(-4px);
            border-color: #8b5cf6;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .card-image {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .meme-card:hover .card-image img {
            transform: scale(1.05);
        }

        .remix-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 0.5rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .meme-card:hover .remix-overlay {
            opacity: 1;
        }

        .remix-overlay span {
            font-size: 0.7rem;
            font-weight: 600;
            color: #a78bfa;
        }

        .card-info {
            padding: 0.8rem;
        }

        .card-creator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .creator-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .creator-name {
            font-weight: 600;
            font-size: 0.8rem;
            flex: 1;
        }

        .card-title {
            font-size: 0.75rem;
            color: #d1d5db;
            margin-bottom: 0.4rem;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stats {
            display: flex;
            gap: 0.8rem;
            font-size: 0.6rem;
            color: #9ca3af;
        }

        .remix-count {
            margin-top: 0.5rem;
            padding-top: 0.4rem;
            border-top: 1px solid #1f1f2e;
            font-size: 0.6rem;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
            grid-column: 1 / -1;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            border: 1px solid #8b5cf6;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 768px) {
            .top-nav {
                padding: 0.75rem 1rem;
            }
            .logo span {
                display: none;
            }
            .page-header {
                padding: 1rem;
            }
            .stats-row {
                padding: 0.5rem 1rem;
            }
            .search-filter-row {
                flex-direction: column;
                padding: 0.5rem 1rem;
            }
            .search-wrapper, .filter-wrapper {
                width: 100%;
            }
            .memes-grid {
                padding: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-nav">
        <div class="logo">
            <i class="fas fa-face-smile"></i>
            <span>Memotions</span>
        </div>
        <div class="nav-icons">
            <i class="fas fa-plus-circle" id="createBtn"></i>
            <i class="fas fa-bell" id="notificationBtn"></i>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-palette"></i> Remix Library</h1>
        <p>Choose a meme to remix and make it your own</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><i class="fas fa-images"></i> 5M Memes</div>
        <div class="stat-card"><i class="fas fa-code-branch"></i> 55.2M Remixes</div>
        <div class="stat-card"><i class="fas fa-users"></i> 4.5M Creators</div>
    </div>

    <div class="search-filter-row">
        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search memes by title or creator...">
            </div>
        </div>
        <div class="filter-wrapper">
            <select id="categorySelect" class="category-select">
                <option value="all">All Categories</option>
                <option value="memes">Memes</option>
                <option value="gifs">GIFs</option>
                <option value="trending">🔥 Trending</option>
            </select>
        </div>
    </div>

    <div id="memesGrid" class="memes-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    const memesGrid = document.getElementById('memesGrid');
    const toast = document.getElementById('toast');
    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');

    let currentCategory = 'all';
    let searchQuery = '';

    const memesData = [
        { id: 1, title: "When the code works first try", image: "https://i.imgflip.com/265j.jpg", creator: "meme_curator", creatorAvatar: "https://robohash.org/memecreator?set=set4&size=40x40", verified: true, likes: "245K", comments: "5.6K", remixes: 128, type: "meme", category: "memes" },
        { id: 2, title: "Distracted boyfriend", image: "https://i.imgflip.com/1bij.jpg", creator: "danklabs", creatorAvatar: "https://robohash.org/dankbrain?set=set3&size=40x40", verified: false, likes: "189K", comments: "4.2K", remixes: 89, type: "meme", category: "memes" },
        { id: 3, title: "Joey - How you doin?", image: "https://media.tenor.com/qDeRj_HS9vIAAAAM/joey-friends.gif", creator: "gif_goddess", creatorAvatar: "https://robohash.org/gifgoddess?set=set2&size=40x40", verified: true, likes: "892K", comments: "23.1K", remixes: 456, type: "gif", category: "gifs" },
        { id: 4, title: "Change my mind", image: "https://i.imgflip.com/2kbn.jpg", creator: "memelord42", creatorAvatar: "https://robohash.org/memelord42?set=set4&size=40x40", verified: false, likes: "467K", comments: "12.2K", remixes: 234, type: "meme", category: "memes" },
        { id: 5, title: "Dancing cat", image: "https://media1.tenor.com/m/TKHlDdyNs9IAAAAd/kiss-kitty.gif", creator: "gif_goddess", creatorAvatar: "https://robohash.org/gifgoddess?set=set2&size=40x40", verified: true, likes: "467K", comments: "12.2K", remixes: 312, type: "gif", category: "gifs" },
        { id: 6, title: "This is fine", image: "https://i.imgflip.com/265j.jpg", creator: "meme_curator", creatorAvatar: "https://robohash.org/memecreator?set=set4&size=40x40", verified: true, likes: "423K", comments: "11.4K", remixes: 178, type: "meme", category: "memes" },
        { id: 7, title: "Cat stare", image: "https://media1.tenor.com/m/HwGJ_4uXGU4AAAAd/stare-cat-stare.gif", creator: "gif_goddess", creatorAvatar: "https://robohash.org/gifgoddess?set=set2&size=40x40", verified: true, likes: "398K", comments: "9.4K", remixes: 267, type: "gif", category: "gifs" },
        { id: 8, title: "Confused math lady", image: "https://i.imgflip.com/43a2z.jpg", creator: "reactionking", creatorAvatar: "https://robohash.org/reactiongod?set=set1&size=40x40", verified: true, likes: "234K", comments: "5.2K", remixes: 98, type: "meme", category: "memes" },
        { id: 9, title: "Dance party", image: "https://media1.tenor.com/m/4bVS-ePkQykAAAAC/claire-dancing.gif", creator: "gif_goddess", creatorAvatar: "https://robohash.org/gifgoddess?set=set2&size=40x40", verified: true, likes: "512K", comments: "14.8K", remixes: 345, type: "gif", category: "gifs" },
        { id: 10, title: "I am the manager!", image: "https://cleanmemes.com/wp-content/uploads/2025/08/img_6145.jpg?w=600", creator: "danklabs", creatorAvatar: "https://robohash.org/dankbrain?set=set3&size=40x40", verified: false, likes: "189K", comments: "4.2K", remixes: 67, type: "meme", category: "memes" },
        { id: 11, title: "Angry cat energy", image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxZFtnBHW2SyhtvQgUyGRNnBVabTE86e3cMQ&s", creator: "memelord42", creatorAvatar: "https://robohash.org/memelord42?set=set4&size=40x40", verified: false, likes: "467K", comments: "12.2K", remixes: 156, type: "meme", category: "memes" },
        { id: 12, title: "Viral explosion", image: "https://i.imgflip.com/2kbn.jpg", creator: "viral_hunter", creatorAvatar: "https://robohash.org/viral?set=set1&size=40x40", verified: false, likes: "567K", comments: "15.3K", remixes: 203, type: "meme", category: "trending" }
    ];

    function showToast(msg, emoji = '🎨') {
        toast.innerHTML = `${emoji} ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function filterMemes() {
        let filtered = [...memesData];
        
        if (currentCategory !== 'all') {
            filtered = filtered.filter(m => m.category === currentCategory);
        }
        
        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(m => 
                m.title.toLowerCase().includes(query) || 
                m.creator.toLowerCase().includes(query)
            );
        }
        
        return filtered;
    }

    function renderMemes() {
        const filtered = filterMemes();
        
        if (filtered.length === 0) {
            memesGrid.innerHTML = `<div class="empty-state"><i class="fas fa-ghost" style="font-size: 2rem; margin-bottom: 0.5rem; display: block;"></i>No memes found<br><span style="font-size: 0.7rem;">Try a different search or category</span></div>`;
            return;
        }
        
        memesGrid.innerHTML = filtered.map(meme => `
            <div class="meme-card" data-id="${meme.id}" data-image="${meme.image}" data-title="${meme.title}" data-creator="${meme.creator}">
                <div class="card-image">
                    <img src="${meme.image}" alt="${meme.title}" onerror="this.src='https://i.imgflip.com/265j.jpg'">
                    <div class="remix-overlay">
                        <span><i class="fas fa-palette"></i> Click to Remix</span>
                    </div>
                </div>
                <div class="card-info">
                    <div class="card-creator">
                        <img class="creator-avatar" src="${meme.creatorAvatar}" alt="${meme.creator}">
                        <span class="creator-name">
                            ${meme.creator}
                            ${meme.verified ? '<i class="fas fa-check-circle" style="color: #8b5cf6; font-size: 0.65rem;"></i>' : ''}
                        </span>
                    </div>
                    <div class="card-title">${meme.title}</div>
                    <div class="card-stats">
                        <span><i class="fas fa-heart"></i> ${meme.likes}</span>
                        <span><i class="fas fa-comment"></i> ${meme.comments}</span>
                    </div>
                    <div class="remix-count">
                        <i class="fas fa-code-branch"></i> ${meme.remixes} remixes
                    </div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.meme-card').forEach(card => {
            card.addEventListener('click', () => {
                const memeData = {
                    id: card.dataset.id,
                    imageUrl: card.dataset.image,
                    title: card.dataset.title,
                    creator: card.dataset.creator
                };
                localStorage.setItem('memotions_remix_data', JSON.stringify(memeData));
                showToast(`Loading "${memeData.title}" for remix...`, '🎨');
                setTimeout(() => {
                    window.location.href = 'remix.html';
                }, 500);
            });
        });
    }

    // Category select
    categorySelect.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        renderMemes();
    });

    // Search input
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderMemes();
    });

    // Navigation
    document.getElementById('createBtn').addEventListener('click', () => showToast('Create new post', '📸'));
    document.getElementById('notificationBtn').addEventListener('click', () => showToast('No new notifications', '🔔'));

    renderMemes();
    showToast('Select any meme to start remixing', '🎨');
</script>
</body>
</html>
