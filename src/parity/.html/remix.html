<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Memotions · Remix Canvas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080c;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: #0a0a10;
            min-height: 100vh;
        }

        /* Top Navigation - Matching platform */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #0c0c14;
            border-bottom: 1px solid #1a1a28;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Irish Grover', cursive;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 0.5rem;
            border-radius: 1rem;
            font-size: 1.2rem;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            font-size: 1.3rem;
            color: #9ca3af;
        }

        .nav-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-icons i:hover {
            color: #a78bfa;
        }

        /* Page Header */
        .page-header {
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a28;
        }

        .page-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-header h1 i {
            color: #a78bfa;
        }

        /* Remix Layout - Two Column */
        .remix-layout {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1.5;
            background: #12121c;
            border-radius: 1rem;
            border: 1px solid #2d2d40;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .canvas-header {
            padding: 1rem;
            border-bottom: 1px solid #2d2d40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .canvas-header span {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .reset-btn {
            background: #1a1a28;
            border: 1px solid #374151;
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: #e5e7eb;
        }

        .canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 450px;
            background: #0a0a12;
            overflow: hidden;
        }

        .meme-canvas {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 500px;
        }

        #canvasImage {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        /* Text Overlay Styles */
        .text-overlay {
            position: absolute;
            cursor: move;
            user-select: none;
            white-space: nowrap;
            font-weight: 800;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            padding: 0;
            z-index: 10;
        }

        .text-overlay.selected {
            outline: 2px solid #8b5cf6;
            outline-offset: 2px;
            border-radius: 4px;
        }

        .delete-text-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #f43f5e;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.1s;
            color: white;
        }

        .text-overlay:hover .delete-text-btn {
            opacity: 1;
        }

        .upload-placeholder {
            text-align: center;
            padding: 3rem;
        }

        .upload-placeholder i {
            font-size: 3rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .upload-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
        }

        /* Tools Panel */
        .tools-panel {
            flex: 1;
            background: #12121c;
            border-radius: 1rem;
            border: 1px solid #2d2d40;
            padding: 1rem;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .tool-section {
            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1f1f2e;
        }

        .tool-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* Text Input */
        .text-input-group {
            margin-bottom: 0.8rem;
        }

        .text-input {
            width: 100%;
            background: #0a0a12;
            border: 1px solid #2d2d40;
            border-radius: 0.6rem;
            padding: 0.6rem;
            color: white;
            font-size: 0.8rem;
        }

        .text-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
        }

        .style-select {
            background: #0a0a12;
            border: 1px solid #2d2d40;
            border-radius: 0.6rem;
            padding: 0.5rem;
            color: white;
            font-size: 0.7rem;
            width: 100%;
        }

        .color-input {
            width: 100%;
            height: 34px;
            background: #0a0a12;
            border: 1px solid #2d2d40;
            border-radius: 0.6rem;
            cursor: pointer;
        }

        .add-text-btn {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 0.6rem;
            border-radius: 0.8rem;
            font-weight: 600;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* Stickers Section */
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .sticker-item {
            background: #1a1a28;
            border-radius: 0.5rem;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .sticker-item:hover {
            background: #2a2a3e;
            transform: scale(1.05);
        }

        /* Filters */
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .filter-item {
            background: #1a1a28;
            border-radius: 0.5rem;
            padding: 0.4rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.65rem;
            transition: all 0.2s;
        }

        .filter-item:hover {
            background: #2a2a3e;
        }

        /* Text Layers List */
        .layers-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 0.5rem;
        }

        .layer-item {
            background: #1a1a28;
            border-radius: 0.5rem;
            padding: 0.4rem 0.6rem;
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .layer-item.active {
            border-color: #8b5cf6;
            background: #22223a;
        }

        .delete-layer {
            background: none;
            border: none;
            color: #f43f5e;
            cursor: pointer;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .btn-post {
            flex: 1;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 0.7rem;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            background: #1a1a28;
            border: 1px solid #374151;
            padding: 0.7rem;
            border-radius: 0.8rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #e5e7eb;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            border: 1px solid #8b5cf6;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; }

        @media (max-width: 900px) {
            .remix-layout {
                flex-direction: column;
            }
            .top-nav {
                padding: 0.75rem 1rem;
            }
            .logo span {
                display: none;
            }
            .page-header {
                padding: 0.75rem 1rem;
            }
            .remix-layout {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-nav">
        <div class="logo">
            <i class="fas fa-face-smile"></i>
            <span>Memotions</span>
        </div>
        <div class="nav-icons">
            <i class="fas fa-bell" id="notificationBtn"></i>
            <i class="fas fa-user-circle" id="profileBtn"></i>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-palette"></i> Remix Canvas</h1>
    </div>

    <div class="remix-layout">
        <!-- Canvas Area -->
        <div class="canvas-area">
            <div class="canvas-header">
                <span><i class="fas fa-image"></i> Your Creation</span>
                <button class="reset-btn" id="resetCanvasBtn"><i class="fas fa-trash-alt"></i> Clear All</button>
            </div>
            <div class="canvas-container">
                <div id="uploadPlaceholder" class="upload-placeholder">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Upload an image or GIF to start remixing</p>
                    <button class="upload-btn" id="uploadImageBtn"><i class="fas fa-plus"></i> Choose File</button>
                </div>
                <div class="meme-canvas" id="memeCanvas" style="display: none;">
                    <img id="canvasImage" alt="Your meme">
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*,image/gif" style="display: none;">
        </div>

        <!-- Tools Panel -->
        <div class="tools-panel">
            <!-- Add Text Section -->
            <div class="tool-section">
                <div class="section-title"><i class="fas fa-font"></i> Add Text</div>
                <input type="text" id="textInput" class="text-input" placeholder="Type your text...">
                <div class="row-2col">
                    <select id="fontSelect" class="style-select">
                        <option value="Impact">Impact</option>
                        <option value="Arial Black">Arial Black</option>
                        <option value="Comic Sans MS">Comic Sans</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Poppins">Poppins</option>
                    </select>
                    <select id="fontSizeSelect" class="style-select">
                        <option value="24">24px</option>
                        <option value="28">28px</option>
                        <option value="32" selected>32px</option>
                        <option value="36">36px</option>
                        <option value="40">40px</option>
                        <option value="48">48px</option>
                    </select>
                </div>
                <div class="row-2col">
                    <input type="color" id="colorPicker" class="color-input" value="#ffffff">
                    <select id="positionSelect" class="style-select">
                        <option value="top">⬆️ Top</option>
                        <option value="middle" selected>⬜ Middle</option>
                        <option value="bottom">⬇️ Bottom</option>
                    </select>
                </div>
                <button class="add-text-btn" id="addTextBtn"><i class="fas fa-plus-circle"></i> Add Text Layer</button>
            </div>

            <!-- Stickers Section -->
            <div class="tool-section">
                <div class="section-title"><i class="fas fa-smile"></i> Stickers</div>
                <div class="stickers-grid">
                    <div class="sticker-item" data-sticker="😂">😂</div>
                    <div class="sticker-item" data-sticker="🔥">🔥</div>
                    <div class="sticker-item" data-sticker="💀">💀</div>
                    <div class="sticker-item" data-sticker="❤️">❤️</div>
                    <div class="sticker-item" data-sticker="😭">😭</div>
                    <div class="sticker-item" data-sticker="👏">👏</div>
                    <div class="sticker-item" data-sticker="😱">😱</div>
                    <div class="sticker-item" data-sticker="🤣">🤣</div>
                </div>
            </div>

            <!-- Filters Section -->
            <div class="tool-section">
                <div class="section-title"><i class="fas fa-filter"></i> Filters</div>
                <div class="filters-grid">
                    <div class="filter-item" data-filter="none">Normal</div>
                    <div class="filter-item" data-filter="grayscale">B&amp;W</div>
                    <div class="filter-item" data-filter="sepia">Sepia</div>
                    <div class="filter-item" data-filter="brightness">Bright</div>
                </div>
            </div>

            <!-- Text Layers -->
            <div class="tool-section">
                <div class="section-title"><i class="fas fa-layer-group"></i> Text Layers</div>
                <div id="textLayersList" class="layers-list">
                    <div style="color: #6b7280; text-align: center; padding: 0.5rem;">No text layers</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
                <button class="btn-post" id="postBtn"><i class="fas fa-paper-plane"></i> Post Remix</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const memeCanvas = document.getElementById('memeCanvas');
    const canvasImage = document.getElementById('canvasImage');
    const textInput = document.getElementById('textInput');
    const fontSelect = document.getElementById('fontSelect');
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const colorPicker = document.getElementById('colorPicker');
    const positionSelect = document.getElementById('positionSelect');
    const addTextBtn = document.getElementById('addTextBtn');
    const resetCanvasBtn = document.getElementById('resetCanvasBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const postBtn = document.getElementById('postBtn');
    const textLayersList = document.getElementById('textLayersList');
    const toast = document.getElementById('toast');

    let currentImageSrc = null;
    let textLayers = [];
    let selectedLayerId = null;
    let nextId = 1;
    let currentFilter = 'none';

    function showToast(msg, emoji = '🎨') {
        toast.innerHTML = `${emoji} ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Upload image
    uploadImageBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageSrc = ev.target.result;
                canvasImage.src = currentImageSrc;
                applyFilter();
                uploadPlaceholder.style.display = 'none';
                memeCanvas.style.display = 'block';
                showToast('Image uploaded! Add text and stickers', '📸');
            };
            reader.readAsDataURL(file);
        }
    });

    function applyFilter() {
        if (!currentImageSrc) return;
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            if (currentFilter === 'grayscale') {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
                    data[i] = gray;
                    data[i+1] = gray;
                    data[i+2] = gray;
                }
                ctx.putImageData(imageData, 0, 0);
            } else if (currentFilter === 'sepia') {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                    data[i+1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                    data[i+2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
                }
                ctx.putImageData(imageData, 0, 0);
            }
            canvasImage.src = canvas.toDataURL();
        };
        img.src = currentImageSrc;
    }

    // Filters
    document.querySelectorAll('.filter-item').forEach(filter => {
        filter.addEventListener('click', () => {
            currentFilter = filter.dataset.filter;
            applyFilter();
            showToast(`${filter.innerText} filter applied`, '🎨');
        });
    });

    // Stickers
    document.querySelectorAll('.sticker-item').forEach(sticker => {
        sticker.addEventListener('click', () => {
            if (!currentImageSrc) {
                showToast('Please upload an image first', '⚠️');
                return;
            }
            const emoji = sticker.dataset.sticker;
            const newLayer = {
                id: nextId++,
                text: emoji,
                font: 'Arial',
                fontSize: 48,
                color: '#ffffff',
                position: 'middle',
                isSticker: true,
                x: null,
                y: null
            };
            textLayers.push(newLayer);
            selectedLayerId = newLayer.id;
            renderAllTexts();
            renderLayersList();
            showToast(`Added ${emoji} sticker`, '✨');
        });
    });

    function createTextElement(layer) {
        const imgRect = canvasImage.getBoundingClientRect();
        
        let x, y;
        if (layer.x && layer.y) {
            x = layer.x;
            y = layer.y;
        } else {
            switch(layer.position) {
                case 'top': x = imgRect.width / 2; y = 25; break;
                case 'bottom': x = imgRect.width / 2; y = imgRect.height - 35; break;
                default: x = imgRect.width / 2; y = imgRect.height / 2;
            }
            layer.x = x;
            layer.y = y;
        }
        
        const div = document.createElement('div');
        div.className = 'text-overlay';
        div.textContent = layer.text;
        div.style.fontFamily = layer.font;
        div.style.fontSize = layer.fontSize + 'px';
        div.style.color = layer.color;
        div.style.fontWeight = '800';
        div.style.textShadow = '2px 2px 0 rgba(0,0,0,0.5)';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.transform = 'translateX(-50%)';
        div.dataset.id = layer.id;
        
        const deleteBtn = document.createElement('div');
        deleteBtn.className = 'delete-text-btn';
        deleteBtn.innerHTML = '<i class="fas fa-times"></i>';
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            div.remove();
            textLayers = textLayers.filter(l => l.id !== layer.id);
            if (selectedLayerId === layer.id) selectedLayerId = null;
            renderLayersList();
            showToast('Layer removed', '🗑️');
        };
        div.appendChild(deleteBtn);
        
        let isDragging = false;
        let startX, startY, startLeft, startTop;
        
        div.addEventListener('mousedown', (e) => {
            if (e.target === deleteBtn) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = parseFloat(div.style.left);
            startTop = parseFloat(div.style.top);
            
            const onMouseMove = (moveEvent) => {
                if (!isDragging) return;
                const dx = moveEvent.clientX - startX;
                const dy = moveEvent.clientY - startY;
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                const imgRect = canvasImage.getBoundingClientRect();
                newLeft = Math.max(5, Math.min(newLeft, imgRect.width - 5));
                newTop = Math.max(5, Math.min(newTop, imgRect.height - 30));
                div.style.left = newLeft + 'px';
                div.style.top = newTop + 'px';
                const layerData = textLayers.find(l => l.id === layer.id);
                if (layerData) { layerData.x = newLeft; layerData.y = newTop; }
            };
            const onMouseUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        
        div.addEventListener('click', (e) => {
            if (e.target === deleteBtn) return;
            document.querySelectorAll('.text-overlay').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedLayerId = layer.id;
            renderLayersList();
            textInput.value = layer.text;
            fontSelect.value = layer.font;
            fontSizeSelect.value = layer.fontSize;
            colorPicker.value = layer.color;
            positionSelect.value = layer.position;
        });
        
        return div;
    }
    
    function renderAllTexts() {
        document.querySelectorAll('.text-overlay').forEach(el => el.remove());
        textLayers.forEach(layer => {
            const textEl = createTextElement(layer);
            memeCanvas.appendChild(textEl);
        });
    }
    
    function renderLayersList() {
        if (textLayers.length === 0) {
            textLayersList.innerHTML = '<div style="color: #6b7280; text-align: center; padding: 0.5rem;">No text layers</div>';
            return;
        }
        textLayersList.innerHTML = textLayers.map(layer => `
            <div class="layer-item ${selectedLayerId === layer.id ? 'active' : ''}" data-id="${layer.id}">
                <span>${layer.text.length > 20 ? layer.text.substring(0, 18) + '..' : layer.text}</span>
                <button class="delete-layer" data-id="${layer.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
        
        document.querySelectorAll('.layer-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.closest('.delete-layer')) return;
                const id = parseInt(item.dataset.id);
                selectedLayerId = id;
                renderLayersList();
                const layer = textLayers.find(l => l.id === id);
                if (layer) {
                    textInput.value = layer.text;
                    fontSelect.value = layer.font;
                    fontSizeSelect.value = layer.fontSize;
                    colorPicker.value = layer.color;
                    positionSelect.value = layer.position;
                    document.querySelectorAll('.text-overlay').forEach(el => el.classList.remove('selected'));
                    const targetEl = Array.from(document.querySelectorAll('.text-overlay')).find(el => parseInt(el.dataset.id) === id);
                    if (targetEl) targetEl.classList.add('selected');
                }
            });
            const deleteBtn = item.querySelector('.delete-layer');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(deleteBtn.dataset.id);
                    textLayers = textLayers.filter(l => l.id !== id);
                    if (selectedLayerId === id) selectedLayerId = null;
                    renderAllTexts();
                    renderLayersList();
                    showToast('Layer removed', '🗑️');
                });
            }
        });
    }
    
    function addTextLayer() {
        if (!currentImageSrc) {
            showToast('Please upload an image first', '⚠️');
            return;
        }
        const newText = textInput.value.trim();
        if (!newText) {
            showToast('Please enter some text', '⚠️');
            return;
        }
        const newLayer = {
            id: nextId++,
            text: newText,
            font: fontSelect.value,
            fontSize: parseInt(fontSizeSelect.value),
            color: colorPicker.value,
            position: positionSelect.value,
            x: null,
            y: null
        };
        textLayers.push(newLayer);
        selectedLayerId = newLayer.id;
        renderAllTexts();
        renderLayersList();
        textInput.value = '';
        showToast('Text added! Drag to reposition', '✏️');
    }
    
    function updateSelectedLayer() {
        if (selectedLayerId !== null) {
            const layer = textLayers.find(l => l.id === selectedLayerId);
            if (layer) {
                if (textInput.value.trim()) layer.text = textInput.value;
                layer.font = fontSelect.value;
                layer.fontSize = parseInt(fontSizeSelect.value);
                layer.color = colorPicker.value;
                layer.position = positionSelect.value;
                renderAllTexts();
                renderLayersList();
            }
        }
    }
    
    textInput.addEventListener('input', updateSelectedLayer);
    fontSelect.addEventListener('change', updateSelectedLayer);
    fontSizeSelect.addEventListener('change', updateSelectedLayer);
    colorPicker.addEventListener('input', updateSelectedLayer);
    positionSelect.addEventListener('change', updateSelectedLayer);
    addTextBtn.addEventListener('click', addTextLayer);
    
    resetCanvasBtn.addEventListener('click', () => {
        if (textLayers.length > 0) {
            textLayers = [];
            selectedLayerId = null;
            renderAllTexts();
            renderLayersList();
            showToast('All layers cleared', '🗑️');
        } else {
            showToast('No layers to clear', '✨');
        }
    });
    
    cancelBtn.addEventListener('click', () => {
        window.location.href = 'memotions.html';
    });
    
    postBtn.addEventListener('click', () => {
        if (!currentImageSrc) {
            showToast('Please upload an image first', '⚠️');
            return;
        }
        showToast('Remix posted successfully!', '🎉');
        setTimeout(() => {
            window.location.href = 'memotions.html';
        }, 1500);
    });
    
    document.getElementById('notificationBtn').addEventListener('click', () => showToast('No new notifications', '🔔'));
    document.getElementById('profileBtn').addEventListener('click', () => window.location.href = 'own_profile.html');
    
    showToast('Remix Canvas — Create your own version', '🎨');
</script>
</body>
</html>
