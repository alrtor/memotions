<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Memotions · Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080c;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .comments-container {
            display: flex;
            max-width: 1300px;
            margin: 0 auto;
            min-height: 100vh;
            background: #0a0a10;
        }

        /* Left Side - Post */
        .post-side {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a12;
            border-right: 1px solid #1a1a28;
            min-height: 100vh;
            padding: 2rem;
        }

        .post-card {
            max-width: 550px;
            width: 100%;
            background: #12121c;
            border-radius: 1rem;
            overflow: hidden;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
        }

        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-author {
            flex: 1;
        }

        .post-author-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .post-author-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .follow-btn-small {
            background: transparent;
            border: 1px solid #374151;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            color: #e5e7eb;
            transition: all 0.2s;
        }

        .follow-btn-small.following {
            background: #1a1a28;
            border-color: #2d2d40;
            color: #9ca3af;
        }

        .follow-btn-small:hover {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: white;
        }

        .verified-icon {
            color: #8b5cf6;
            font-size: 0.7rem;
        }

        .post-location {
            font-size: 0.65rem;
            color: #6b7280;
            margin-top: 0.1rem;
        }

        .post-menu {
            color: #9ca3af;
            cursor: pointer;
        }

        .post-image {
            width: 100%;
            background: #0a0a12;
        }

        .post-image img {
            width: 100%;
            object-fit: contain;
            max-height: 550px;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            padding: 0.8rem 1rem;
        }

        .post-action {
            background: none;
            border: none;
            color: #e5e7eb;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .post-action:hover {
            transform: scale(1.05);
        }

        .post-action.liked {
            color: #f43f5e;
        }

        .post-action.saved {
            color: #fbbf24;
        }

        .post-stats {
            padding: 0 1rem 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .post-caption {
            padding: 0 1rem 0.5rem 1rem;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .caption-author {
            font-weight: 700;
            margin-right: 0.5rem;
        }

        .post-time {
            padding: 0 1rem 1rem 1rem;
            font-size: 0.65rem;
            color: #6b7280;
        }

        /* Right Side - Comments - Larger */
        .comments-side {
            width: 450px;
            display: flex;
            flex-direction: column;
            background: #0c0c14;
        }

        .comments-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #1a1a28;
        }

        .back-btn {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
        }

        .comments-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
        }

        /* Comment Item - Larger */
        .comment-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.2rem;
        }

        .comment-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.3rem;
        }

        .comment-name {
            font-weight: 700;
            font-size: 0.85rem;
        }

        .comment-username {
            font-size: 0.7rem;
            color: #6b7280;
        }

        .comment-time {
            font-size: 0.65rem;
            color: #6b7280;
        }

        .comment-text {
            font-size: 0.85rem;
            color: #e5e7eb;
            line-height: 1.4;
            margin-bottom: 0.4rem;
        }

        .comment-actions {
            display: flex;
            gap: 1.2rem;
            margin-top: 0.3rem;
        }

        .comment-action {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .comment-action:hover {
            color: #a78bfa;
        }

        .comment-action.liked {
            color: #f43f5e;
        }

        /* View Replies */
        .view-replies {
            margin-left: 3.2rem;
            padding: 0.2rem 0 0.6rem 0;
            font-size: 0.7rem;
            color: #6b7280;
            cursor: pointer;
        }

        .view-replies:hover {
            color: #a78bfa;
        }

        /* Replies Container */
        .replies-container {
            margin-left: 3.2rem;
        }

        .reply-item {
            display: flex;
            gap: 1rem;
            padding: 0.7rem 0;
        }

        .reply-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .reply-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reply-content {
            flex: 1;
        }

        .reply-header {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.2rem;
        }

        .reply-name {
            font-weight: 700;
            font-size: 0.8rem;
        }

        .reply-username {
            font-size: 0.65rem;
            color: #6b7280;
        }

        .reply-time {
            font-size: 0.6rem;
            color: #6b7280;
        }

        .reply-text {
            font-size: 0.8rem;
            color: #e5e7eb;
            line-height: 1.4;
            margin-bottom: 0.3rem;
        }

        .reply-actions {
            display: flex;
            gap: 1.2rem;
            margin-top: 0.2rem;
        }

        .reply-action {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
        }

        .reply-action.liked {
            color: #f43f5e;
        }

        /* Comment Input */
        .comment-input-wrapper {
            padding: 1rem 1.2rem;
            border-top: 1px solid #1a1a28;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .input-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .input-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-container {
            flex: 1;
        }

        .comment-input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 0.6rem 0;
            color: white;
            font-size: 0.85rem;
            resize: none;
            font-family: 'Inter', sans-serif;
        }

        .comment-input:focus {
            outline: none;
        }

        .comment-input::placeholder {
            color: #6b7280;
        }

        .input-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .cancel-reply {
            background: #1a1a28;
            border: 1px solid #374151;
            padding: 0.4rem 1rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: #e5e7eb;
        }

        .post-comment {
            background: none;
            border: none;
            color: #8b5cf6;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .post-comment:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .replying-badge {
            font-size: 0.7rem;
            color: #a78bfa;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .empty-comments {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            border: 1px solid #8b5cf6;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .post-side {
                display: none;
            }
            .comments-side {
                width: 100%;
            }
            .back-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
<div class="comments-container">
    <!-- Left Side - Post -->
    <div class="post-side">
        <div class="post-card">
            <div class="post-header">
                <div class="post-avatar">
                    <img id="postAvatar" src="https://robohash.org/memecreator?set=set4&size=50x50" alt="avatar">
                </div>
                <div class="post-author">
                    <div class="post-author-row">
                        <span class="post-author-name" id="postAuthorName">meme_curator</span>
                        <i class="fas fa-check-circle verified-icon"></i>
                        <button class="follow-btn-small" id="followBtn">Follow</button>
                    </div>
                    <div class="post-location">Memotions • 2h ago</div>
                </div>
                <div class="post-menu">
                    <i class="fas fa-ellipsis-h"></i>
                </div>
            </div>
            <div class="post-image">
                <img id="postImage" src="https://i.pinimg.com/236x/6e/cd/a3/6ecda36c05b5d79b6b8a3f3f105fd66f.jpg" alt="post">
            </div>
            <div class="post-actions">
                <button class="post-action" id="likePostBtn"><i class="far fa-heart"></i></button>
                <button class="post-action" id="commentBtn"><i class="far fa-comment"></i></button>
                <button class="post-action" id="shareBtn"><i class="far fa-paper-plane"></i></button>
                <button class="post-action" id="saveBtn" style="margin-left: auto;"><i class="far fa-bookmark"></i></button>
            </div>
            <div class="post-stats">
                <span id="postLikes">245,234</span> likes
            </div>
            <div class="post-caption">
                <span class="caption-author" id="postAuthorName2">meme_curator</span>
                <span id="postCaption">When the code works on the first try 🎉 #programmerhumor</span>
            </div>
            <div class="post-time" id="postTime">2 HOURS AGO</div>
        </div>
    </div>

    <!-- Right Side - Comments -->
    <div class="comments-side">
        <div class="comments-header">
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <h3>Comments</h3>
        </div>

        <div class="comments-list" id="commentsList"></div>

        <div class="comment-input-wrapper">
            <div class="input-avatar">
                <img src="https://robohash.org/currentuser?set=set4&size=40x40" alt="avatar">
            </div>
            <div class="input-container">
                <div id="replyIndicator" style="display: none;" class="replying-badge">
                    <i class="fas fa-reply"></i> Replying to <span id="replyToName"></span>
                </div>
                <textarea class="comment-input" id="commentInput" placeholder="Add a comment..." rows="1"></textarea>
                <div class="input-actions" id="replyActions" style="display: none;">
                    <button class="cancel-reply" id="cancelReplyBtn">Cancel</button>
                    <button class="post-comment" id="postReplyBtn">Reply</button>
                </div>
                <div class="input-actions" id="commentActions">
                    <button class="post-comment" id="postCommentBtn">Post</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Post data
    const currentPost = {
        id: 123,
        authorName: "meme_curator",
        authorUsername: "@memotions_official",
        authorAvatar: "https://robohash.org/memecreator?set=set4&size=50x50",
        caption: "When the code works on the first try 🎉 #programmerhumor",
        image: "https://i.pinimg.com/236x/6e/cd/a3/6ecda36c05b5d79b6b8a3f3f105fd66f.jpg",
        time: "2 hours ago",
        likes: 245234,
        liked: false,
        saved: false,
        following: false
    };

    // Comments data
    let comments = [
        {
            id: 1,
            name: "gif_goddess",
            username: "@gif_goddess",
            avatar: "https://robohash.org/gifqueen?set=set2&size=40x40",
            text: "This is so relatable! 😂",
            time: "2h",
            likes: 124,
            liked: false,
            replies: [
                {
                    id: 101,
                    name: "danklabs",
                    username: "@danklabs",
                    avatar: "https://robohash.org/dankbrain?set=set3&size=30x30",
                    text: "Exactly what I was thinking! 😅",
                    time: "1h",
                    likes: 23,
                    liked: false
                }
            ],
            showReplies: true
        },
        {
            id: 2,
            name: "reactionking",
            username: "@reactionking",
            avatar: "https://robohash.org/reactiongod?set=set1&size=40x40",
            text: "Me every Monday morning 😅",
            time: "1h",
            likes: 89,
            liked: true,
            replies: [],
            showReplies: true
        },
        {
            id: 3,
            name: "memelover42",
            username: "@memelover42",
            avatar: "https://robohash.org/memelover42?set=set4&size=40x40",
            text: "Bro this hits different 🔥",
            time: "30m",
            likes: 45,
            liked: false,
            replies: [],
            showReplies: true
        }
    ];

    let replyingTo = null;
    let nextCommentId = 100;
    let nextReplyId = 200;

    const commentsList = document.getElementById('commentsList');
    const commentInput = document.getElementById('commentInput');
    const postCommentBtn = document.getElementById('postCommentBtn');
    const postReplyBtn = document.getElementById('postReplyBtn');
    const cancelReplyBtn = document.getElementById('cancelReplyBtn');
    const replyActions = document.getElementById('replyActions');
    const commentActions = document.getElementById('commentActions');
    const replyIndicator = document.getElementById('replyIndicator');
    const replyToName = document.getElementById('replyToName');
    const toast = document.getElementById('toast');
    const likePostBtn = document.getElementById('likePostBtn');
    const saveBtn = document.getElementById('saveBtn');
    const shareBtn = document.getElementById('shareBtn');
    const followBtn = document.getElementById('followBtn');
    const postLikesSpan = document.getElementById('postLikes');

    function loadPostData() {
        document.getElementById('postAvatar').src = currentPost.authorAvatar;
        document.getElementById('postAuthorName').textContent = currentPost.authorName;
        document.getElementById('postAuthorName2').textContent = currentPost.authorName;
        document.getElementById('postImage').src = currentPost.image;
        document.getElementById('postCaption').textContent = currentPost.caption;
        document.getElementById('postTime').textContent = currentPost.time.toUpperCase();
        updatePostLikes();
        updateSaveButton();
        updateFollowButton();
    }

    function updatePostLikes() {
        postLikesSpan.textContent = currentPost.likes.toLocaleString();
        if (currentPost.liked) {
            likePostBtn.innerHTML = '<i class="fas fa-heart" style="color: #f43f5e;"></i>';
        } else {
            likePostBtn.innerHTML = '<i class="far fa-heart"></i>';
        }
    }

    function updateSaveButton() {
        if (currentPost.saved) {
            saveBtn.innerHTML = '<i class="fas fa-bookmark" style="color: #fbbf24;"></i>';
        } else {
            saveBtn.innerHTML = '<i class="far fa-bookmark"></i>';
        }
    }

    function updateFollowButton() {
        if (currentPost.following) {
            followBtn.textContent = 'Following';
            followBtn.classList.add('following');
        } else {
            followBtn.textContent = 'Follow';
            followBtn.classList.remove('following');
        }
    }

    // Like post
    likePostBtn.addEventListener('click', () => {
        currentPost.liked = !currentPost.liked;
        currentPost.likes += currentPost.liked ? 1 : -1;
        updatePostLikes();
        showToast(currentPost.liked ? 'Liked post' : 'Unliked post', '❤️');
    });

    // Save post
    saveBtn.addEventListener('click', () => {
        currentPost.saved = !currentPost.saved;
        updateSaveButton();
        showToast(currentPost.saved ? 'Saved to collection' : 'Removed from saved', '🔖');
    });

    // Share post
    shareBtn.addEventListener('click', () => {
        // Copy to clipboard
        const dummy = document.createElement('textarea');
        dummy.value = `Check out this post on Memotions: ${currentPost.caption}`;
        document.body.appendChild(dummy);
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        showToast('Link copied to clipboard!', '📤');
    });

    // Follow button
    followBtn.addEventListener('click', () => {
        currentPost.following = !currentPost.following;
        updateFollowButton();
        showToast(currentPost.following ? `Following @${currentPost.authorName}` : `Unfollowed @${currentPost.authorName}`, '👥');
    });

    // Comment button - scroll to input
    document.getElementById('commentBtn').addEventListener('click', () => {
        commentInput.focus();
        showToast('Write a comment...', '💬');
    });

    function showToast(msg, emoji = '💬') {
        toast.innerHTML = `${emoji} ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatNumber(num) {
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    function renderComments() {
        if (comments.length === 0) {
            commentsList.innerHTML = `<div class="empty-comments">No comments yet. Be the first to comment!</div>`;
            return;
        }

        commentsList.innerHTML = comments.map(comment => `
            <div>
                <div class="comment-item">
                    <div class="comment-avatar">
                        <img src="${comment.avatar}" alt="avatar">
                    </div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="comment-name">${escapeHtml(comment.name)}</span>
                            <span class="comment-username">${escapeHtml(comment.username)}</span>
                            <span class="comment-time">${comment.time}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-actions">
                            <button class="comment-action like-comment" data-id="${comment.id}">
                                <i class="${comment.liked ? 'fas' : 'far'} fa-heart"></i> ${formatNumber(comment.likes)}
                            </button>
                            <button class="comment-action reply-to-comment" data-id="${comment.id}" data-name="${comment.name}" data-username="${comment.username}">
                                Reply
                            </button>
                        </div>
                    </div>
                </div>
                ${comment.replies.length > 0 ? `
                    <div class="replies-container">
                        ${comment.replies.map(reply => `
                            <div class="reply-item">
                                <div class="reply-avatar">
                                    <img src="${reply.avatar}" alt="avatar">
                                </div>
                                <div class="reply-content">
                                    <div class="reply-header">
                                        <span class="reply-name">${escapeHtml(reply.name)}</span>
                                        <span class="reply-username">${escapeHtml(reply.username)}</span>
                                        <span class="reply-time">${reply.time}</span>
                                    </div>
                                    <div class="reply-text">${escapeHtml(reply.text)}</div>
                                    <div class="reply-actions">
                                        <button class="reply-action like-reply" data-comment-id="${comment.id}" data-reply-id="${reply.id}">
                                            <i class="${reply.liked ? 'fas' : 'far'} fa-heart"></i> ${formatNumber(reply.likes)}
                                        </button>
                                        <button class="reply-action reply-to-reply" data-comment-id="${comment.id}" data-name="${reply.name}" data-username="${reply.username}">
                                            Reply
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                ${comment.replies.length > 0 ? `
                    <div class="view-replies" data-id="${comment.id}">
                        <i class="fas ${comment.showReplies ? 'fa-chevron-up' : 'fa-chevron-down'}"></i>
                        ${comment.showReplies ? 'Hide replies' : `View all ${comment.replies.length} replies`}
                    </div>
                ` : ''}
            </div>
        `).join('');

        attachEventListeners();
    }

    function attachEventListeners() {
        document.querySelectorAll('.like-comment').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentId = parseInt(btn.dataset.id);
                const comment = comments.find(c => c.id === commentId);
                if (comment) {
                    comment.liked = !comment.liked;
                    comment.likes += comment.liked ? 1 : -1;
                    renderComments();
                }
            });
        });

        document.querySelectorAll('.like-reply').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentId = parseInt(btn.dataset.commentId);
                const replyId = parseInt(btn.dataset.replyId);
                const comment = comments.find(c => c.id === commentId);
                if (comment) {
                    const reply = comment.replies.find(r => r.id === replyId);
                    if (reply) {
                        reply.liked = !reply.liked;
                        reply.likes += reply.liked ? 1 : -1;
                        renderComments();
                    }
                }
            });
        });

        document.querySelectorAll('.reply-to-comment').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentId = parseInt(btn.dataset.id);
                const commentName = btn.dataset.name;
                const commentUsername = btn.dataset.username;
                replyingTo = { type: 'comment', id: commentId, name: commentName, username: commentUsername };
                replyToName.textContent = commentUsername;
                replyIndicator.style.display = 'flex';
                commentInput.placeholder = `Reply to ${commentUsername}...`;
                commentInput.focus();
                replyActions.style.display = 'flex';
                commentActions.style.display = 'none';
            });
        });

        document.querySelectorAll('.reply-to-reply').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentId = parseInt(btn.dataset.commentId);
                const replyName = btn.dataset.name;
                const replyUsername = btn.dataset.username;
                replyingTo = { type: 'reply', commentId: commentId, name: replyName, username: replyUsername };
                replyToName.textContent = replyUsername;
                replyIndicator.style.display = 'flex';
                commentInput.placeholder = `Reply to ${replyUsername}...`;
                commentInput.focus();
                replyActions.style.display = 'flex';
                commentActions.style.display = 'none';
            });
        });

        document.querySelectorAll('.view-replies').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentId = parseInt(el.dataset.id);
                const comment = comments.find(c => c.id === commentId);
                if (comment) {
                    comment.showReplies = !comment.showReplies;
                    renderComments();
                }
            });
        });
    }

    function addNewComment() {
        const text = commentInput.value.trim();
        if (!text) {
            showToast('Please enter a comment', '⚠️');
            return;
        }

        const newComment = {
            id: nextCommentId++,
            name: "You",
            username: "@current_user",
            avatar: "https://robohash.org/currentuser?set=set4&size=40x40",
            text: text,
            time: "now",
            likes: 0,
            liked: false,
            replies: [],
            showReplies: true
        };

        comments.unshift(newComment);
        commentInput.value = '';
        renderComments();
        showToast('Comment posted!', '✅');
    }

    function addReply() {
        if (!replyingTo) return;
        
        const text = commentInput.value.trim();
        if (!text) {
            showToast('Please enter a reply', '⚠️');
            return;
        }

        const newReply = {
            id: nextReplyId++,
            name: "You",
            username: "@current_user",
            avatar: "https://robohash.org/currentuser?set=set4&size=28x28",
            text: text,
            time: "now",
            likes: 0,
            liked: false
        };

        if (replyingTo.type === 'comment') {
            const comment = comments.find(c => c.id === replyingTo.id);
            if (comment) {
                comment.replies.push(newReply);
                comment.showReplies = true;
                showToast(`Replied to ${replyingTo.username}`, '✅');
            }
        } else if (replyingTo.type === 'reply') {
            const comment = comments.find(c => c.id === replyingTo.commentId);
            if (comment) {
                comment.replies.push(newReply);
                comment.showReplies = true;
                showToast(`Replied to ${replyingTo.username}`, '✅');
            }
        }

        commentInput.value = '';
        cancelReply();
        renderComments();
    }

    function cancelReply() {
        replyingTo = null;
        commentInput.placeholder = "Add a comment...";
        replyIndicator.style.display = 'none';
        replyActions.style.display = 'none';
        commentActions.style.display = 'flex';
    }

    postCommentBtn.addEventListener('click', addNewComment);
    postReplyBtn.addEventListener('click', addReply);
    cancelReplyBtn.addEventListener('click', cancelReply);

    commentInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (replyingTo) {
                addReply();
            } else {
                addNewComment();
            }
        }
    });

    commentInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        window.history.back();
    });

    loadPostData();
    renderComments();
</script>
</body>
</html>
