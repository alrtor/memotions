<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Memotions · Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080c;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            background: #0a0a10;
            min-height: 100vh;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #0c0c14;
            border-bottom: 1px solid #1a1a28;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Irish Grover', cursive;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 0.5rem;
            border-radius: 1rem;
            font-size: 1.2rem;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            font-size: 1.3rem;
            color: #9ca3af;
        }

        .nav-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .page-header {
            text-align: center;
            padding: 1.5rem 2rem 0.5rem 2rem;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0.5rem 2rem;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: #12121c;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            border: 1px solid #2d2d40;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .stat-pill i { color: #fbbf24; }

        .category-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }

        .category-pill {
            background: #12121c;
            border: 1px solid #2d2d40;
            padding: 0.5rem 1.3rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-pill.active {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: white;
        }

        .period-bar {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.5rem 2rem 1.5rem 2rem;
        }

        .period-btn {
            background: #12121c;
            border: 1px solid #2d2d40;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9ca3af;
            cursor: pointer;
        }

        .period-btn.active {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: white;
        }

        /* Podium */
        .podium-section {
            padding: 1rem 2rem;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .podium-card {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 160px;
        }

        .podium-card:hover { transform: translateY(-5px); }
        .podium-card.rank-2 { order: 1; }
        .podium-card.rank-1 { order: 2; }
        .podium-card.rank-3 { order: 3; }

        .podium-top {
            background: #1a1a28;
            border-radius: 1rem 1rem 0 0;
            padding: 1rem 0.5rem;
            position: relative;
            border: 1px solid #2d2d40;
            border-bottom: none;
        }

        .podium-card.rank-1 .podium-top {
            background: linear-gradient(135deg, #1a1a2a, #12121c);
            border-color: #fbbf24;
        }
        .podium-card.rank-2 .podium-top { border-color: #c0c0c0; }
        .podium-card.rank-3 .podium-top { border-color: #cd7f32; }

        .rank-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a28;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .podium-card.rank-1 .rank-badge {
            background: #fbbf24;
            color: #1a1a2e;
        }
        .podium-card.rank-2 .rank-badge {
            background: #c0c0c0;
            color: #1a1a2e;
        }
        .podium-card.rank-3 .rank-badge {
            background: #cd7f32;
            color: white;
        }

        .crown-icon { font-size: 1.3rem; margin-bottom: -0.2rem; }

        .podium-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0.5rem auto;
            overflow: hidden;
            border: 2px solid #8b5cf6;
        }
        .podium-card.rank-1 .podium-avatar {
            width: 85px;
            height: 85px;
            border-width: 3px;
        }
        .podium-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .podium-name {
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        .podium-score {
            font-size: 0.7rem;
            font-weight: 600;
            color: #a78bfa;
            margin-top: 0.2rem;
        }

        .top-post-preview {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .top-post-img {
            width: 40px;
            height: 40px;
            border-radius: 0.5rem;
            margin: 0 auto;
            overflow: hidden;
        }
        .top-post-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .top-post-label {
            font-size: 0.55rem;
            color: #6b7280;
            margin-top: 0.2rem;
        }

        .podium-base {
            height: 10px;
            background: #1a1a28;
            border-radius: 0 0 0.6rem 0.6rem;
            border: 1px solid #2d2d40;
            border-top: none;
        }
        .podium-card.rank-1 .podium-base {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            border-color: #fbbf24;
        }
        .podium-card.rank-2 .podium-base {
            background: linear-gradient(135deg, #c0c0c0, #9ca3af);
            border-color: #c0c0c0;
        }
        .podium-card.rank-3 .podium-base {
            background: linear-gradient(135deg, #cd7f32, #b45309);
            border-color: #cd7f32;
        }

        /* TABLE WITH HEADERS */
        .leaderboard-table {
            margin: 0.5rem 2rem 2rem 2rem;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a28;
            border-radius: 0.8rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            border: 1px solid #2d2d40;
        }

        .header-left {
            width: 40%;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }

        .header-middle {
            width: 25%;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }

        .header-right {
            width: 35%;
            text-align: right;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }

        .rank-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #12121c;
            border-radius: 0.8rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            border: 1px solid #2d2d40;
            transition: all 0.2s;
            cursor: pointer;
        }

        .rank-row:hover {
            border-color: #8b5cf6;
            background: #1a1a28;
            transform: translateX(5px);
        }

        .rank-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 40%;
        }

        .rank-number {
            font-weight: 800;
            font-size: 1rem;
            width: 45px;
        }
        .rank-1-number { color: #fbbf24; }
        .rank-2-number { color: #c0c0c0; }
        .rank-3-number { color: #cd7f32; }

        .rank-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .rank-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .rank-middle {
            width: 25%;
            text-align: center;
        }

        .rank-score {
            font-weight: 700;
            color: #a78bfa;
            font-size: 0.85rem;
        }

        .rank-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 35%;
            justify-content: flex-end;
        }

        .rank-post {
            width: 45px;
            height: 45px;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .rank-post img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rank-reactions {
            display: flex;
            gap: 0.3rem;
            font-size: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            border: 1px solid #8b5cf6;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1001;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 800px) {
            .top-nav { padding: 0.75rem 1rem; }
            .logo span { display: none; }
            .page-header { padding: 1rem; }
            .stats-bar { padding: 0.5rem 1rem; }
            .category-bar { padding: 0.5rem 1rem; }
            .period-bar { padding: 0.5rem 1rem 1rem 1rem; }
            .podium-section { padding: 1rem; }
            .podium-card { width: 110px; }
            .podium-avatar { width: 50px; height: 50px; }
            .podium-card.rank-1 .podium-avatar { width: 60px; height: 60px; }
            .leaderboard-table { margin: 0 1rem 1rem 1rem; }
            .rank-left { width: 45%; }
            .rank-middle { width: 20%; }
            .rank-right { width: 35%; }
            .rank-name { font-size: 0.7rem; }
            .header-left { width: 45%; }
            .header-middle { width: 20%; }
            .header-right { width: 35%; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-nav">
        <div class="logo">
            <i class="fas fa-face-smile"></i>
            <span>Memotions</span>
        </div>
        <div class="nav-icons">
            <i class="fas fa-plus-circle" id="createBtn"></i>
            <i class="fas fa-bell" id="notificationBtn"></i>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-trophy" style="color: #fbbf24;"></i> Leaderboard</h1>
        <p>Top creators ranked by their impact</p>
    </div>

    <div class="stats-bar">
        <div class="stat-pill"><i class="fas fa-users"></i> 4.5M Creators</div>
        <div class="stat-pill"><i class="fas fa-fire"></i> 2.8M Posts</div>
        <div class="stat-pill"><i class="fas fa-heart"></i> 180.5M Reactions</div>
    </div>

    <div class="category-bar" id="categoryBar">
        <div class="category-pill active" data-cat="all"><i class="fas fa-fire"></i> All</div>
        <div class="category-pill" data-cat="memes"><i class="fas fa-face-smile"></i> Memes</div>
        <div class="category-pill" data-cat="gifs"><i class="fas fa-gift"></i> GIFs</div>
        <div class="category-pill" data-cat="reactions"><i class="fas fa-face-surprise"></i> Reactions</div>
    </div>

    <div class="period-bar">
        <button class="period-btn active" data-period="weekly">Weekly</button>
        <button class="period-btn" data-period="monthly">Monthly</button>
        <button class="period-btn" data-period="alltime">All Time</button>
    </div>

    <div class="podium-section">
        <div id="podium" class="podium"></div>
    </div>

    <div class="leaderboard-table">
        <div class="table-header">
            <div class="header-left">CREATOR</div>
            <div class="header-middle">SCORE</div>
            <div class="header-right">TOP POST & REACTIONS</div>
        </div>
        <div id="tableBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const podiumDiv = document.getElementById('podium');
    const tableBody = document.getElementById('tableBody');
    const toast = document.getElementById('toast');

    let currentPeriod = 'weekly';
    let currentCategory = 'all';

    const firstNames = ['meme', 'gif', 'dank', 'funny', 'epic', 'cool', 'pro', 'king', 'queen', 'lord', 'master', 'legend', 'viral', 'trend', 'react', 'laugh', 'smile', 'crypto', 'anime', 'game', 'wholesome', 'dark', 'light', 'chaos', 'shadow', 'blaze', 'frost', 'storm'];
    const secondNames = ['curator', 'master', 'lord', 'king', 'queen', 'creator', 'maker', 'pro', 'artist', 'wizard', 'guru', 'expert', 'hunter', 'spotter', 'lover', 'fan', 'addict', 'collector', 'vault', 'central', 'hub', 'zone', 'world'];

    const avatars = [
        'https://robohash.org/c1?set=set4&size=80x80',
        'https://robohash.org/c2?set=set4&size=80x80',
        'https://robohash.org/c3?set=set4&size=80x80',
        'https://robohash.org/c4?set=set4&size=80x80'
    ];

    const topPostImages = [
        'https://i.pinimg.com/236x/6e/cd/a3/6ecda36c05b5d79b6b8a3f3f105fd66f.jpg',
        'https://cleanmemes.com/wp-content/uploads/2025/08/img_6145.jpg?w=600',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxZFtnBHW2SyhtvQgUyGRNnBVabTE86e3cMQ&s',
        'https://i.imgflip.com/2/265j.jpg'
    ];

    const reactionOptions = [
        ['😂', '🔥', '❤️'],
        ['🔥', '💀', '😭'],
        ['❤️', '😂', '👏'],
        ['💀', '🔥', '😂']
    ];

    function getRandomName() {
        const first = firstNames[Math.floor(Math.random() * firstNames.length)];
        const second = secondNames[Math.floor(Math.random() * secondNames.length)];
        return first + '_' + second;
    }

    function getRandomScore(period, category) {
        let base;
        if (period === 'weekly') base = Math.floor(Math.random() * 30000) + 10000;
        else if (period === 'monthly') base = Math.floor(Math.random() * 120000) + 30000;
        else base = Math.floor(Math.random() * 1500000) + 200000;
        
        if (category === 'memes') return Math.floor(base * (0.8 + Math.random() * 0.5));
        if (category === 'gifs') return Math.floor(base * (0.7 + Math.random() * 0.6));
        if (category === 'reactions') return Math.floor(base * (0.6 + Math.random() * 0.7));
        return base;
    }

    function generateCreators(count, period, categoryFilter) {
        const creators = [];
        for (let i = 0; i < count; i++) {
            const creatorCategory = ['memes', 'gifs', 'reactions'][Math.floor(Math.random() * 3)];
            if (categoryFilter !== 'all' && creatorCategory !== categoryFilter) continue;
            
            creators.push({
                rank: i + 1,
                name: getRandomName(),
                avatar: avatars[creators.length % avatars.length],
                score: getRandomScore(period, creatorCategory),
                topPost: topPostImages[Math.floor(Math.random() * topPostImages.length)],
                topReactions: reactionOptions[Math.floor(Math.random() * reactionOptions.length)]
            });
        }
        while (creators.length < count) {
            creators.push({
                rank: creators.length + 1,
                name: getRandomName(),
                avatar: avatars[creators.length % avatars.length],
                score: getRandomScore(period, 'all'),
                topPost: topPostImages[Math.floor(Math.random() * topPostImages.length)],
                topReactions: reactionOptions[Math.floor(Math.random() * reactionOptions.length)]
            });
        }
        creators.sort((a, b) => b.score - a.score);
        creators.forEach((c, idx) => c.rank = idx + 1);
        return creators;
    }

    // Generate data for each period and category
    let allData = {
        weekly: {
            all: generateCreators(35, 'weekly', 'all'),
            memes: generateCreators(35, 'weekly', 'memes'),
            gifs: generateCreators(35, 'weekly', 'gifs'),
            reactions: generateCreators(35, 'weekly', 'reactions')
        },
        monthly: {
            all: generateCreators(35, 'monthly', 'all'),
            memes: generateCreators(35, 'monthly', 'memes'),
            gifs: generateCreators(35, 'monthly', 'gifs'),
            reactions: generateCreators(35, 'monthly', 'reactions')
        },
        alltime: {
            all: generateCreators(35, 'alltime', 'all'),
            memes: generateCreators(35, 'alltime', 'memes'),
            gifs: generateCreators(35, 'alltime', 'gifs'),
            reactions: generateCreators(35, 'alltime', 'reactions')
        }
    };

    function getRankNumberClass(rank) {
        if (rank === 1) return 'rank-1-number';
        if (rank === 2) return 'rank-2-number';
        if (rank === 3) return 'rank-3-number';
        return '';
    }

    function renderLeaderboard() {
        const creators = allData[currentPeriod][currentCategory];
        
        if (!creators || creators.length === 0) return;

        const top3 = creators.slice(0, 3);
        podiumDiv.innerHTML = top3.map(creator => `
            <div class="podium-card rank-${creator.rank}" data-creator="${creator.name}">
                <div class="podium-top">
                    <div class="rank-badge">#${creator.rank}</div>
                    ${creator.rank === 1 ? '<div class="crown-icon">👑</div>' : ''}
                    <div class="podium-avatar"><img src="${creator.avatar}" alt="${creator.name}"></div>
                    <div class="podium-name">${creator.name.length > 12 ? creator.name.substring(0, 10) + '..' : creator.name}</div>
                    <div class="podium-score">${creator.score.toLocaleString()}</div>
                    <div class="top-post-preview">
                        <div class="top-post-img"><img src="${creator.topPost}" alt="top"></div>
                        <div class="top-post-label">Top Post</div>
                    </div>
                </div>
                <div class="podium-base"></div>
            </div>
        `).join('');

        const rest = creators.slice(3);
        tableBody.innerHTML = rest.map(creator => `
            <div class="rank-row" data-creator="${creator.name}">
                <div class="rank-left">
                    <div class="rank-number ${getRankNumberClass(creator.rank)}">#${creator.rank}</div>
                    <img class="rank-avatar" src="${creator.avatar}" alt="${creator.name}">
                    <div class="rank-name">${creator.name.length > 18 ? creator.name.substring(0, 15) + '..' : creator.name}</div>
                </div>
                <div class="rank-middle">
                    <div class="rank-score">${creator.score.toLocaleString()}</div>
                </div>
                <div class="rank-right">
                    <div class="rank-post"><img src="${creator.topPost}" alt="post"></div>
                    <div class="rank-reactions">${creator.topReactions.map(r => `<span>${r}</span>`).join('')}</div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.podium-card, .rank-row').forEach(el => {
            el.addEventListener('click', () => showToast(`Viewing ${el.dataset.creator}'s profile`, '👤'));
        });
    }

    function showToast(msg, emoji = '🏆') {
        toast.innerHTML = `${emoji} ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Category selection
    document.querySelectorAll('.category-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            currentCategory = pill.dataset.cat;
            renderLeaderboard();
            const catNames = { all: 'All', memes: 'Memes', gifs: 'GIFs', reactions: 'Reactions' };
            showToast(`${catNames[currentCategory]} category`, '🏷️');
        });
    });

    // Period selection
    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPeriod = btn.dataset.period;
            renderLeaderboard();
            const periodNames = { weekly: 'Weekly', monthly: 'Monthly', alltime: 'All Time' };
            showToast(`${periodNames[currentPeriod]} Leaderboard`, '📊');
        });
    });

    document.getElementById('createBtn').addEventListener('click', () => showToast('Create new post', '📸'));
    document.getElementById('notificationBtn').addEventListener('click', () => showToast('No new notifications', '🔔'));

    renderLeaderboard();
    showToast('Weekly Leaderboard', '🏆');
</script>
</body>
</html>
